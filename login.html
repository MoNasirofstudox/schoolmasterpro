<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SchoolMasterPro — Sign In</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="smp-supabase.js"></script>
<style>
body{font-family:'Inter',sans-serif;}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
.fill-icon{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;}
</style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4">

<div class="w-full max-w-sm">
  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="w-12 h-12 bg-black rounded-xl flex items-center justify-center mx-auto mb-4">
      <span class="material-symbols-outlined text-white fill-icon" style="font-size:24px">verified</span>
    </div>
    <h1 class="text-2xl font-bold text-slate-900 tracking-tight">SchoolMasterPro</h1>
    <p class="text-sm text-slate-500 mt-1">Sign in to your school account</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8">
    <div id="errorBanner" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2 text-sm text-red-700">
      <span class="material-symbols-outlined" style="font-size:16px">error</span>
      <span id="errorMsg">Invalid email or password.</span>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Email Address</label>
        <input id="email" type="email" placeholder="operator@school.com"
          class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm text-slate-900 focus:border-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-900/10 transition-all"
          onkeydown="if(event.key==='Enter') signIn()"/>
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Password</label>
        <div class="relative">
          <input id="password" type="password" placeholder="••••••••"
            class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm text-slate-900 focus:border-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-900/10 transition-all pr-10"
            onkeydown="if(event.key==='Enter') signIn()"/>
          <button onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
            <span id="eyeIcon" class="material-symbols-outlined" style="font-size:18px">visibility</span>
          </button>
        </div>
      </div>
      <button id="signInBtn" onclick="signIn()"
        class="w-full bg-black text-white font-semibold py-2.5 rounded-lg text-sm hover:bg-slate-800 active:scale-[0.98] transition-all mt-2">
        Sign In
      </button>
    </div>

    <p class="text-center text-xs text-slate-400 mt-6">
      Forgot your password? Contact your school administrator.
    </p>
  </div>

  <p class="text-center text-xs text-slate-400 mt-6">
    SchoolMasterPro · School Management Platform
  </p>
</div>

<script>
// Redirect if already logged in
;(async () => {
  const sb = getClient()
  const { data: { session } } = await sb.auth.getSession()
  if (session) window.location.href = 'index.html'
})()

function togglePwd() {
  const inp = document.getElementById('password')
  const icon = document.getElementById('eyeIcon')
  if (inp.type === 'password') { inp.type = 'text'; icon.textContent = 'visibility_off' }
  else { inp.type = 'password'; icon.textContent = 'visibility' }
}

async function signIn() {
  const btn = document.getElementById('signInBtn')
  const errBanner = document.getElementById('errorBanner')
  const errMsg = document.getElementById('errorMsg')
  errBanner.classList.add('hidden')

  const email = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value

  if (!email || !password) {
    errMsg.textContent = 'Please enter your email and password.'
    errBanner.classList.remove('hidden')
    return
  }

  setLoading(btn, true)
  try {
    await Auth.signIn(email, password)
    window.location.href = 'index.html'
  } catch (err) {
    errMsg.textContent = err.message || 'Invalid email or password.'
    errBanner.classList.remove('hidden')
    setLoading(btn, false)
  }
}
</script>
</body>
</html>
