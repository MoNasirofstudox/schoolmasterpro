<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SchoolMasterPro — Admin Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="smp-supabase.js"></script>
<style>body{font-family:'Inter',sans-serif;}.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}.fill-icon{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="min-h-screen bg-gray-900 flex items-center justify-center p-4">
<div class="w-full max-w-sm">
  <div class="text-center mb-8">
    <div class="w-12 h-12 bg-green-700 rounded-xl flex items-center justify-center mx-auto mb-4"><span class="material-symbols-outlined text-white fill-icon" style="font-size:24px">admin_panel_settings</span></div>
    <h1 class="text-2xl font-bold text-white tracking-tight">Platform Admin</h1>
    <p class="text-sm text-gray-400 mt-1">Internal access only</p>
  </div>
  <div class="bg-gray-800 rounded-2xl border border-gray-700 p-8">
    <div id="errorBanner" class="hidden mb-4 p-3 bg-red-900/50 border border-red-700 rounded-lg flex items-center gap-2 text-sm text-red-300">
      <span class="material-symbols-outlined" style="font-size:16px">error</span><span id="errorMsg">Invalid credentials.</span>
    </div>
    <div class="space-y-4">
      <div><label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1.5">Email</label><input id="email" type="email" placeholder="admin@schoolmasterpro.com" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2.5 text-sm text-white placeholder:text-gray-500 focus:border-green-500 focus:outline-none" onkeydown="if(event.key==='Enter')signIn()"/></div>
      <div><label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1.5">Password</label><input id="password" type="password" placeholder="••••••••" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2.5 text-sm text-white placeholder:text-gray-500 focus:border-green-500 focus:outline-none" onkeydown="if(event.key==='Enter')signIn()"/></div>
      <button id="signInBtn" onclick="signIn()" class="w-full bg-green-700 text-white font-semibold py-2.5 rounded-lg text-sm hover:bg-green-600 active:scale-[0.98] transition-all mt-2">Sign In to Admin Panel</button>
    </div>
  </div>
  <p class="text-center text-xs text-gray-600 mt-6">SchoolMasterPro · Restricted Access</p>
</div>
<script>
;(async()=>{
  const{data:{session}}=await getClient().auth.getSession()
  if(session){
    const{data:admin}=await getClient().from('platform_admins').select('id').eq('id',session.user.id).maybeSingle()
    if(admin) window.location.href='admin.html'
  }
})()
async function signIn(){
  const btn=document.getElementById('signInBtn')
  const err=document.getElementById('errorBanner')
  const msg=document.getElementById('errorMsg')
  err.classList.add('hidden')
  setLoading(btn,true)
  try{
    const{data,error}=await getClient().auth.signInWithPassword({email:document.getElementById('email').value.trim(),password:document.getElementById('password').value})
    if(error)throw error
    const{data:admin}=await getClient().from('platform_admins').select('id').eq('id',data.user.id).maybeSingle()
    if(!admin){await getClient().auth.signOut();throw new Error('Access denied. Not a platform admin.')}
    window.location.href='admin.html'
  }catch(e){
    msg.textContent=e.message||'Invalid credentials.'
    err.classList.remove('hidden')
    setLoading(btn,false)
  }
}
</script>
</body>
</html>
